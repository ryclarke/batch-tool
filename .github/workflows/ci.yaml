name: Golang CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

env:
  LINTER_VERSION: "v2.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        env:
          SEMVER_VERSION: "3.4.0"
          YQ_VERSION: "v4.50.1"
        run: |
          curl -L https://raw.githubusercontent.com/fsaintjacques/semver-tool/${SEMVER_VERSION}/src/semver -o $HOME/go/bin/semver
          go install github.com/mikefarah/yq/v4@${YQ_VERSION}

      - name: Run linter checks
        uses: golangci/golangci-lint-action@v9
        with:
          version: "${{ env.LINTER_VERSION }}"
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify that the application builds successfully
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: build --snapshot --clean --single-target

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests and generate coverage report
        run: make cover
