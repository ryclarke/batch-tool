# $schema: https://golangci-lint.run/jsonschema/golangci.v2.11.jsonschema.json
version: "2"

run:
  timeout: 5m
  tests: true  # Lint test files but use exclusions below

linters:
  enable:
    # Core linters
    - errcheck        # Check for unchecked errors
    - govet           # Vet examines Go source code
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Go static analysis
    - unused          # Check for unused code

    # Style
    - gocritic        # Comprehensive opinionated checks for style, performance, and bugs
    - revive          # Fast, configurable, extensible, flexible, and beautiful linter

    # Code quality
    - dupl            # Code clone detection
    - misspell        # Spell checker for comments
    - nilnil          # Check for simultaneous return of nil error and an invalid value
    - noctx           # Detect HTTP requests sent without a context.Context
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Report unused function parameters
    - whitespace      # Detection of leading/trailing whitespace

    # Error handling
    - errname         # Checks that sentinel errors are prefixed with Err
    - errorlint       # Find code that will cause problems with Go 1.13+ error wrapping

    # Performance
    - prealloc        # Find slice declarations that could potentially be pre-allocated

    # Security
    - gosec           # Inspect source code for security problems

    # Architecture
    - depguard        # Enforce import restrictions

  settings:
    depguard:
      rules:
        viper-context:
          files:
            - "!**/config/**"  # Apply to all files EXCEPT in config package
          deny:
            - pkg: "github.com/spf13/viper"
              desc: "viper should only be imported in the config package; use config.Viper(ctx) instead"

    gosec:
      excludes:
        - G104 # (unhandled errors) is fully covered by errcheck with curated exclusions.

  exclusions:
    warn-unused: true
    generated: strict
    presets:
      - std-error-handling
    rules:
      # Exclude unwanted linters from test files
      - path: _test\.go|utils/testing/.+\.go
        linters:
          - dupl
          - errcheck
          - gocritic
          - gosec

      # Exclude unwanted revive style rules from test files
      - path: _test\.go|utils/testing/.+\.go
        text: "context-as-argument|dot-imports"
        linters:
          - revive

      # Exclude exhaustive comments for config key constants
      - path: config/configurations\.go
        text: "exported"
        linters:
          - revive

      # Exclude common intentional error handling and test cleanup cases
      - text: "Error return value of.*(Write(String)?|Fprint(f|ln)?|Close|RemoveAll|Set|MarkHidden|BindPFlag).* is not checked"
        linters:
          - errcheck

      # Make exceptions for core batch-tool functionality that inherently involves security-sensitive operations:
      #   gosec G204: arbitrary subprocess execution is intrinsic to batch-tool's purpose
      #   gosec G304: file inclusion via variable is required for user-provided config paths
      #   gosec G704: bitbucket SCM client.Do executes user-configured SCM API URLs by design.
      - path: utils/cmd\.go
        text: "G204|G304"
        linters:
          - gosec
      - path: scm/bitbucket/provider\.go
        text: "G704"
        linters:
          - gosec

      # Ignore false positive in gosec findings:
      #   gosec G101: potential hardcoded credentials are actually config token filter delimiters
      - path: config/configurations\.go
        text: "G101"
        linters:
          - gosec

      # Ignore dupl findings in TUI output handlers, which are intentionally similar for consistency and maintainability:
      #   dupl: catalog and labels TUI Update methods follow the same bubbletea pattern by design.
      - path: output/tui_(catalog|labels)\.go
        linters:
          - dupl

formatters:
  enable:
    - gci    # Go imports formatter
    - gofmt  # Check whether code was gofmt-ed
  settings:
    gci:
      sections:
        - standard                               # Standard section: captures all standard packages
        - default                                # Default section: contains all imports that could not be matched to another section
        - prefix(github.com/ryclarke/batch-tool) # Custom section: groups internal packages
        - blank                                  # Blank imports section: captures all blank/underscore imports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
